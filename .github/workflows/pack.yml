name: Pack Desktop App

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag name to upload dist zip artifacts to
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  pack:
    name: pack (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install root dependencies
        run: npm i

      - name: Install playground dependencies
        working-directory: playground
        run: npm ci

      - name: Build playground
        working-directory: playground
        run: npm run build

      - name: Install akashic-mcp dependencies
        working-directory: akashic-mcp
        run: npm ci

      - name: Pack application
        run: npm run pack -- --publish never

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: namagame-creator-${{ matrix.label }}
          path: dist/**
          if-no-files-found: error

      - name: Upload zip assets to release
        if: ${{ github.event.inputs.tag_name != '' && hashFiles('dist/*.zip') != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          files: dist/*.zip
          fail_on_unmatched_files: false
